<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sema Analytics - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }
        
        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            text-align: right;
        }
        
        .message-content {
            display: inline-block;
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        
        .message.bot .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 8px 0;
        }
        
        .message-content a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .message-content a:hover {
            text-decoration: underline;
        }
        
        .message-content strong {
            font-weight: 700;
        }
        
        .chat-input-container {
            padding: 20px 24px;
            background: white;
            border-top: 1px solid #e9ecef;
        }
        
        .chat-input-wrapper {
            display: flex;
            gap: 12px;
        }
        
        #chatInput {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        #chatInput:focus {
            border-color: #667eea;
        }
        
        #sendButton {
            padding: 14px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        #sendButton:hover {
            transform: scale(1.05);
        }
        
        #sendButton:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 8px 12px;
            border-radius: 8px;
            margin: 8px 0;
            font-size: 14px;
        }
        
        /* Scrollbar styling */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>👋 Sema Analytics</h1>
            <p>Votre assistant Business Intelligence - Campagne UCB</p>
        </div>
        
        <div id="chatMessages" class="chat-messages">
            <div class="message bot">
                <div class="message-content">
                    Hello ! Je suis Sema Analytics, votre compagnon Business Intelligence pour la campagne UCB. Je suis là pour répondre à toutes vos questions concernant cette campagne.
                </div>
            </div>
        </div>
        
        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <input type="text" id="chatInput" placeholder="Posez votre question..." autocomplete="off">
                <button id="sendButton">Envoyer</button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');
        
        // Configuration du webhook n8n
        const webhookUrl = 'https://n8n-pro.kaeyros.org/webhook/4b006081-ff51-46a1-9986-9ef046cd7255';
        const corsProxy = 'https://corsproxy.io/?';

        // Intercepter les clics sur les liens de téléchargement CSV
        chatMessages.addEventListener('click', function(e) {
            const link = e.target.closest('a[href*="download-csv"]');
            if (link) {
                e.preventDefault();
                e.stopPropagation();
                
                const originalText = link.textContent;
                link.textContent = '⏳ Téléchargement...';
                
                // Utiliser le proxy CORS pour télécharger le fichier
                const fileUrl = link.href;
                const proxiedUrl = corsProxy + encodeURIComponent(fileUrl);
                
                fetch(proxiedUrl)
                    .then(response => {
                        if (!response.ok) throw new Error('Network response was not ok');
                        return response.blob();
                    })
                    .then(blob => {
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'export.csv';
                        document.body.appendChild(a);
                        a.click();
                        window.URL.revokeObjectURL(url);
                        document.body.removeChild(a);
                        link.textContent = '✅ Téléchargé !';
                        setTimeout(() => {
                            link.textContent = originalText;
                        }, 2000);
                    })
                    .catch(error => {
                        console.error('Erreur de téléchargement:', error);
                        link.textContent = '❌ Erreur';
                        setTimeout(() => {
                            link.textContent = originalText;
                        }, 2000);
                        
                        // Afficher un message d'erreur dans le chat
                        const errorDiv = document.createElement('div');
                        errorDiv.className = 'error-message';
                        errorDiv.textContent = 'Erreur lors du téléchargement. Veuillez réessayer.';
                        chatMessages.appendChild(errorDiv);
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                    });
                
                return false;
            }
        });

        // Fonction pour ajouter un message
        function addMessage(text, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            // Convertir le Markdown en HTML basique
            let htmlText = text
                .replace(/📊/g, '<span>📊</span>')
                .replace(/💡/g, '<span>💡</span>')
                .replace(/🎯/g, '<span>🎯</span>')
                .replace(/📗/g, '<span>📗</span>')
                .replace(/📄/g, '<span>📄</span>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
                .replace(/\n/g, '<br>');
            
            contentDiv.innerHTML = htmlText;
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Fonction pour envoyer un message
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || sendButton.disabled) return;
            
            // Désactiver l'input
            sendButton.disabled = true;
            sendButton.innerHTML = '<span class="loading"></span>';
            
            // Afficher le message utilisateur
            addMessage(message, true);
            chatInput.value = '';
            
            try {
                // Utiliser corsproxy.io pour contourner CORS
                const proxiedWebhookUrl = corsProxy + encodeURIComponent(webhookUrl);
                
                const response = await fetch(proxiedWebhookUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chatInput: message,
                        sessionId: localStorage.getItem('sessionId') || 
                                  (localStorage.setItem('sessionId', crypto.randomUUID()) || 
                                   localStorage.getItem('sessionId'))
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                const botResponse = data.output || data.message || JSON.stringify(data);
                
                addMessage(botResponse);
            } catch (error) {
                console.error('Erreur:', error);
                addMessage('❌ Désolé, une erreur est survenue. Veuillez réessayer.');
            } finally {
                sendButton.disabled = false;
                sendButton.textContent = 'Envoyer';
                chatInput.focus();
            }
        }

        // Événements
        sendButton.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Focus sur l'input au chargement
        chatInput.focus();
    </script>
</body>
</html>
